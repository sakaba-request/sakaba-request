<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>トクサツ酒場 リクエスト受付</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #ffffff;
      color: #2c1a0e;
      min-height: 100vh;
    }

    /* ── バナー ── */
    .banner {
      width: 100%;
      display: block;
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── メインコンテンツ ── */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── ヘッダーテキスト ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e8ddc8;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 800;
      color: #2c1a0e;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .header .note {
      font-size: 12px;
      color: #7a6a55;
      line-height: 1.7;
      text-align: left;
      background: #faf7f0;
      border-left: 3px solid #c9a84c;
      padding: 10px 12px;
      border-radius: 0 6px 6px 0;
    }

    /* ── フォーム ── */
    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #2c1a0e;
      margin-bottom: 7px;
      letter-spacing: 0.03em;
    }
    .form-group label .req {
      color: #c0392b;
      margin-left: 3px;
      font-size: 12px;
    }
    .form-group label .opt {
      color: #aaa;
      font-size: 11px;
      font-weight: 400;
      margin-left: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      background: #ffffff;
      border: 1.5px solid #d8cdb8;
      border-radius: 8px;
      color: #2c1a0e;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-group input::placeholder { color: #bbb; }
    .form-group input:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .form-group input.has-error { border-color: #c0392b; }

    .form-group textarea {
      width: 100%;
      padding: 13px 14px;
      background: #ffffff;
      border: 1.5px solid #d8cdb8;
      border-radius: 8px;
      color: #2c1a0e;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-group textarea::placeholder { color: #bbb; }
    .form-group textarea:focus {
      outline: none;
      border-color: #c9a84c;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }

    .err-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 5px;
      display: none;
    }
    .err-msg.show { display: block; }

    /* ── 送信ボタン ── */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: #2c1a0e;
      border: none;
      border-radius: 8px;
      color: #f5edd8;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
      -webkit-appearance: none;
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(245,237,216,0.4);
      border-top-color: #f5edd8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 完了画面 ── */
    .success-screen { display: none; text-align: center; padding: 20px 0; }
    .success-screen.show { display: block; }

    .success-icon {
      width: 68px; height: 68px;
      background: #2c1a0e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-screen h2 {
      font-size: 20px;
      font-weight: 800;
      color: #2c1a0e;
      margin-bottom: 8px;
    }
    .success-screen .sub {
      color: #7a6a55;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 4px;
    }

    .summary-box {
      background: #faf7f0;
      border: 1.5px solid #e8ddc8;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 20px 0;
      text-align: left;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid #e8ddc8;
      gap: 12px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label {
      font-size: 11px;
      color: #9a8a75;
      white-space: nowrap;
      min-width: 56px;
      padding-top: 1px;
    }
    .summary-value {
      font-size: 13px;
      color: #2c1a0e;
      text-align: right;
      word-break: break-all;
    }

    .another-btn {
      width: 100%;
      padding: 13px;
      background: #fff;
      border: 1.5px solid #d8cdb8;
      border-radius: 8px;
      color: #7a6a55;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-appearance: none;
    }
    .another-btn:active { background: #faf7f0; }

    .form-view.hide { display: none; }

    .divider {
      height: 1px;
      background: #e8ddc8;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <!-- バナー画像 -->
  <div class="banner">
    <img src="./banner.png" alt="トクサツ酒場 リクエストボード">
  </div>

  <div class="content">

    <!-- フォーム画面 -->
    <div class="form-view" id="formView">
      <div class="header">
        <h1>トクサツ酒場<br>リクエスト受付</h1>
        <div class="note">
          聴きたい曲をリクエストしてください。<br>
          ※リクエストいただいてもかからない場合がありますのであらかじめご了承ください。
        </div>
      </div>

      <form id="requestForm" novalidate>

        <div class="form-group">
          <label>作品名<span class="req">*</span></label>
          <input type="text" id="workTitle"
                 placeholder="例：仮面ライダー、スーパー戦隊など"
                 maxlength="100" autocomplete="off">
          <div class="err-msg" id="workTitleErr">作品名を入力してください</div>
        </div>

        <div class="form-group">
          <label>曲名<span class="req">*</span></label>
          <input type="text" id="songTitle"
                 placeholder="例：Butter-Fly、forever love"
                 maxlength="100" autocomplete="off">
          <div class="err-msg" id="songTitleErr">曲名を入力してください</div>
        </div>

        <div class="form-group">
          <label>歌手・アーティスト<span class="req">*</span></label>
          <input type="text" id="artist"
                 placeholder="例：石野陽子、影山ヒロノブ"
                 maxlength="100" autocomplete="off">
          <div class="err-msg" id="artistErr">歌手・アーティストを入力してください</div>
        </div>

        <div class="form-group">
          <label>お名前<span class="opt">（任意）</span></label>
          <input type="text" id="requesterName"
                 placeholder="ニックネームでもOK！"
                 maxlength="50" autocomplete="off">
        </div>

        <div class="form-group">
          <label>コメント<span class="opt">（任意）</span></label>
          <textarea id="comment"
                    placeholder="リクエストした理由やメッセージなどあれば"
                    maxlength="200" rows="3"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          リクエストを送る
        </button>

      </form>
    </div>

    <!-- 完了画面 -->
    <div class="success-screen" id="successView">
      <div class="success-icon">✓</div>
      <h2>リクエスト受付完了！</h2>
      <p class="sub">ありがとうございます。<br>演奏できるよう頑張ります！</p>

      <div class="summary-box" id="summaryBox"></div>

      <button class="another-btn" onclick="resetForm()">
        別の曲もリクエストする
      </button>
    </div>

  </div>

<script>
  // ========================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwacbC0CDa_cInsMotMg7c1iZPh_A2PQG7WkzoBi86a9R2erTfvA8lgZyM2N4pXt5Yjtg/exec';
  // ========================================

  const form        = document.getElementById('requestForm');
  const submitBtn   = document.getElementById('submitBtn');
  const formView    = document.getElementById('formView');
  const successView = document.getElementById('successView');
  const summaryBox  = document.getElementById('summaryBox');

  const REQUIRED = [
    { id: 'workTitle', errId: 'workTitleErr' },
    { id: 'songTitle', errId: 'songTitleErr' },
    { id: 'artist',    errId: 'artistErr'    },
  ];

  REQUIRED.forEach(({ id, errId }) => {
    document.getElementById(id).addEventListener('input', function () {
      this.classList.remove('has-error');
      document.getElementById(errId).classList.remove('show');
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) return;

    const payload = {
      workTitle:     document.getElementById('workTitle').value.trim(),
      songTitle:     document.getElementById('songTitle').value.trim(),
      artist:        document.getElementById('artist').value.trim(),
      requesterName: document.getElementById('requesterName').value.trim() || '匿名',
      comment:       document.getElementById('comment').value.trim(),
    };

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>送信中...';

    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify(payload),
      });
      showSuccess(payload);
    } catch (_) {
      alert('送信に失敗しました。電波状況を確認してもう一度お試しください。');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'リクエストを送る';
    }
  });

  function validate() {
    let ok = true;
    REQUIRED.forEach(({ id, errId }) => {
      const el  = document.getElementById(id);
      const err = document.getElementById(errId);
      if (!el.value.trim()) {
        el.classList.add('has-error');
        err.classList.add('show');
        ok = false;
      }
    });
    return ok;
  }

  function showSuccess(data) {
    formView.classList.add('hide');
    const rows = [
      { label: '作品名', value: data.workTitle },
      { label: '曲名',   value: data.songTitle },
      { label: '歌手',   value: data.artist },
      { label: 'お名前', value: data.requesterName },
      ...(data.comment ? [{ label: 'コメント', value: data.comment }] : []),
    ];
    summaryBox.innerHTML = rows.map(r =>
      `<div class="summary-row">
         <span class="summary-label">${r.label}</span>
         <span class="summary-value">${esc(r.value)}</span>
       </div>`
    ).join('');
    successView.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    form.reset();
    submitBtn.disabled = false;
    submitBtn.innerHTML = 'リクエストを送る';
    REQUIRED.forEach(({ id, errId }) => {
      document.getElementById(id).classList.remove('has-error');
      document.getElementById(errId).classList.remove('show');
    });
    formView.classList.remove('hide');
    successView.classList.remove('show');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
</script>
</body>
</html>
